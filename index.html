<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruvia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="title-wrap">
        <h1 class="title">Ruvia</h1>
        <div class="subtitle">compact knot workbench</div>
      </div>
      <div class="toolbar-actions">
        <button id="newKnotBtn" class="tool-btn" type="button">New Knot</button>
        <button id="exportBtn" class="tool-btn" type="button">Export Root</button>
        <button id="importBtn" class="tool-btn" type="button">Import Root</button>
        <button id="resetBtn" class="tool-btn danger" type="button">Reset</button>
        <input id="importInput" type="file" accept=".root,.json,application/json" multiple hidden>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <section class="canvas-pane" aria-label="canvas pane">
        <section id="canvas" class="canvas" aria-label="knot canvas"></section>
        <svg id="edgeLayer" class="edge-layer" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="knotLayer" class="knot-layer"></div>
        <div class="floating-ui" aria-hidden="false">
          <div id="colorControls" class="color-controls">
            <button id="colorDotBtn" class="color-dot-btn" type="button" title="knot color">●</button>
            <div id="colorPalette" class="color-palette"></div>
          </div>
          <div id="zoomControls" class="zoom-controls" role="group" aria-label="畫布縮放（knot 檢視）">
            <button id="zoomOutBtn" class="zoom-btn" type="button" title="縮小" aria-label="縮小">−</button>
            <button id="zoomInBtn" class="zoom-btn" type="button" title="放大" aria-label="放大">+</button>
          </div>
        </div>
      </section>

      <aside id="tray" class="tray-pane" aria-label="tray area">
        <div class="tray-head">
          <div class="tray-title">tray</div>
          <div class="tray-actions">
            <button id="trayImportBtn" class="tray-action-btn" type="button" title="Import Root">in</button>
            <button id="trayExportBtn" class="tray-action-btn" type="button" title="Export Root">out</button>
          </div>
        </div>
        <div id="templateTray" class="template-tray"></div>
        <div id="trayKnotLayer" class="tray-knot-layer"></div>
      </aside>
      <button id="trayCollapseBtn" class="tray-collapse-btn" type="button" aria-label="toggle tray">❯</button>
      <button id="trayDrawerToggle" class="tray-drawer-toggle" type="button" aria-label="open tray">◱</button>

      <div id="menu-panel" class="menu-panel" aria-label="menu panel">
        <div id="menu-panel-list"></div>
      </div>
      <button id="menuDrawerToggle" class="menu-drawer-toggle" type="button" aria-label="open menu">𓏢</button>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
